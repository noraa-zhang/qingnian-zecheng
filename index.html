<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>城市补贴指南 · CityMatch</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
/* ===== Base ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF7F2;
  --bg-2: #F4EFE6;
  --surface: #FFFFFF;
  --ink: #1F1A14;
  --ink-2: #4B4338;
  --ink-3: #8A7F70;
  --line: #ECE5D8;
  --line-2: #E3DAC8;

  --amber: #F59E42;
  --amber-2: #E8842A;
  --amber-bg: #FFF3E2;
  --amber-bg-2: #FFE7C9;
  --amber-ink: #8A4D10;

  --teal: #2E8C81;
  --teal-bg: #DCEFEB;
  --teal-ink: #1F5F58;

  --indigo: #4F5BD5;
  --indigo-bg: #E6E8FB;
  --indigo-ink: #2E369B;

  --rose: #C8556A;
  --rose-bg: #FBE3E7;
  --rose-ink: #8B2E40;

  --green: #4F8F3A;
  --green-bg: #E5F1D9;
  --green-ink: #2F5E22;

  --radius: 16px;
  --radius-lg: 22px;
  --radius-sm: 10px;

  --shadow-sm: 0 1px 2px rgba(60,45,20,.04), 0 1px 1px rgba(60,45,20,.03);
  --shadow-md: 0 4px 14px rgba(60,45,20,.06), 0 2px 4px rgba(60,45,20,.04);
  --shadow-lg: 0 20px 40px -16px rgba(60,45,20,.16), 0 6px 14px rgba(60,45,20,.06);

  --gradient-warm: linear-gradient(135deg, #FFE7C9 0%, #FFD3A0 40%, #FFB670 100%);
  --gradient-amber: linear-gradient(135deg, #F8A94E 0%, #E8842A 100%);
  --gradient-soft: linear-gradient(180deg, #FFF7EA 0%, #FAF7F2 100%);

  --font-zh: "PingFang SC","HarmonyOS Sans SC","Hiragino Sans GB","Noto Sans SC",system-ui,sans-serif;
  --font-en: "SF Pro Display",-apple-system,BlinkMacSystemFont,"Helvetica Neue",system-ui,sans-serif;
}
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-en), var(--font-zh);
  font-feature-settings: "ss01","cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  min-height: 100vh;
  background:
    radial-gradient(900px 600px at 90% -10%, #FFE7C9 0%, transparent 60%),
    radial-gradient(700px 500px at -10% 10%, #E5F1D9 0%, transparent 55%),
    var(--bg);
  background-attachment: fixed;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ===== Layout ===== */
.shell { max-width: 1280px; margin: 0 auto; padding: 28px 36px 80px; }

/* ===== Top bar ===== */
.topbar {
  display: flex; align-items: center; gap: 24px;
  padding: 14px 0 22px;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  font-weight: 600; font-size: 17px; letter-spacing: -0.01em;
}
.brand-mark {
  width: 36px; height: 36px; border-radius: 11px;
  background: var(--gradient-amber);
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 18px;
  box-shadow: 0 6px 16px -4px rgba(232,132,42,.45), inset 0 -2px 0 rgba(0,0,0,.08);
}
.brand-sub { color: var(--ink-3); font-weight: 400; font-size: 13px; margin-left: 2px; }

.tabs {
  display: flex; gap: 4px;
  background: rgba(255,255,255,.6);
  border: 1px solid var(--line);
  padding: 5px; border-radius: 14px;
  margin: 0 auto;
  backdrop-filter: blur(8px);
  box-shadow: var(--shadow-sm);
}
.tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px; font-size: 14px; font-weight: 500;
  color: var(--ink-2); border-radius: 10px;
  transition: all 160ms ease; position: relative;
}
.tab:hover { color: var(--ink); background: rgba(255,255,255,.5); }
.tab.active {
  background: var(--ink); color: #fff;
  box-shadow: 0 4px 12px -2px rgba(31,26,20,.2);
}
.tab .badge {
  background: var(--amber); color: #fff;
  font-size: 11px; padding: 1px 6px;
  border-radius: 999px; font-weight: 600;
}
.tab.active .badge { background: rgba(255,255,255,.22); }

.top-user { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #FFD3A0, #2E8C81);
  display: grid; place-items: center;
  color: #fff; font-weight: 600; font-size: 14px;
  box-shadow: var(--shadow-sm);
}

/* ===== Hero ===== */
.hero {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 32px 36px; margin-bottom: 22px;
  overflow: hidden; box-shadow: var(--shadow-md);
}
.hero::before {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(450px 280px at 92% 30%, rgba(245,158,66,.16), transparent 70%),
    radial-gradient(400px 240px at 8% 110%, rgba(46,140,129,.12), transparent 70%);
  pointer-events: none;
}
.hero-inner { position: relative; display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 500;
  padding: 5px 11px 5px 8px;
  background: var(--amber-bg); color: var(--amber-ink);
  border-radius: 999px; letter-spacing: 0.02em;
}
.hero-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,66,.18); }
.hero h1 {
  font-size: 36px; font-weight: 600;
  letter-spacing: -0.02em; line-height: 1.15;
  margin: 12px 0 8px; color: var(--ink);
}
.hero h1 .accent {
  background: linear-gradient(120deg, #E8842A, #C8556A);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.hero p { color: var(--ink-2); font-size: 15px; line-height: 1.55; max-width: 540px; }

.hero-stats { display: grid; grid-auto-flow: column; gap: 18px; align-self: stretch; align-items: end; }
.hero-stat { text-align: right; padding-left: 22px; border-left: 1px solid var(--line); }
.hero-stat .num { font-size: 26px; font-weight: 600; color: var(--ink); letter-spacing: -0.02em; }
.hero-stat .lbl { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

/* ===== Search & filter bar ===== */
.filter-bar {
  display: grid; grid-template-columns: 1fr auto; gap: 14px;
  background: var(--surface); border: 1px solid var(--line);
  padding: 14px; border-radius: var(--radius);
  margin-bottom: 16px; box-shadow: var(--shadow-sm);
}
.searchbox {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-2); border-radius: 12px;
  padding: 0 14px; border: 1px solid transparent;
  transition: all 160ms ease;
}
.searchbox:focus-within {
  border-color: var(--amber); background: #fff;
  box-shadow: 0 0 0 4px rgba(245,158,66,.12);
}
.searchbox svg { color: var(--ink-3); flex-shrink: 0; }
.searchbox input {
  background: none; border: none; outline: none;
  padding: 12px 0; width: 100%; font-size: 14px;
}
.searchbox input::placeholder { color: var(--ink-3); }
.search-kbd {
  font-size: 11px; color: var(--ink-3);
  border: 1px solid var(--line-2); background: #fff;
  padding: 2px 7px; border-radius: 6px;
  font-family: "SF Mono", ui-monospace, monospace;
}

.chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--bg-2);
  border: 1px solid var(--line-2); border-radius: 999px;
  font-size: 13px; color: var(--ink-2); font-weight: 500;
  transition: all 140ms ease; white-space: nowrap;
}
.chip:hover { background: #fff; border-color: var(--ink-3); color: var(--ink); }
.chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.chip.active.warm { background: var(--gradient-amber); border-color: transparent; box-shadow: 0 6px 16px -6px rgba(232,132,42,.55); }
.chip .ico { font-size: 14px; opacity: 0.9; }

/* ===== Persona banner ===== */
.persona-banner {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--amber-bg);
  border: 1px solid rgba(245,158,66,.3);
  border-radius: 12px; margin-bottom: 14px;
  font-size: 13px; color: var(--amber-ink);
  animation: fade-in 300ms ease both;
}
.persona-banner strong { font-weight: 600; }
.persona-banner-close {
  margin-left: auto; opacity: 0.5; font-size: 16px;
  line-height: 1; padding: 2px 4px;
}
.persona-banner-close:hover { opacity: 1; }

/* ===== City grid ===== */
.city-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
}
.city-card {
  position: relative;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 0; overflow: hidden;
  transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
}
.city-card:hover {
  transform: translateY(-3px); box-shadow: var(--shadow-lg);
  border-color: var(--line-2);
}
.city-card .banner {
  height: 64px; position: relative;
  background: linear-gradient(135deg, var(--c1,#FFE7C9), var(--c2,#FFB670));
  overflow: hidden;
}
.city-card .city-pin {
  position: absolute; top: 12px; left: 14px;
  font-size: 11px; font-weight: 600; color: var(--ink);
  background: rgba(255,255,255,.85);
  padding: 4px 10px; border-radius: 999px;
  backdrop-filter: blur(4px); letter-spacing: 0.04em; z-index: 2;
}
.city-card .fav-btn {
  position: absolute; top: 10px; right: 10px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.92);
  display: grid; place-items: center;
  backdrop-filter: blur(4px);
  transition: transform 140ms ease, background 140ms ease;
  z-index: 2;
}
.city-card .fav-btn:hover { transform: scale(1.08); }
.city-card .fav-btn.active { background: var(--rose); color: #fff; }
.city-card .fav-btn svg { width: 16px; height: 16px; }

.city-card .body { padding: 16px 18px 18px; display: flex; flex-direction: column; flex: 1; gap: 12px; }
.city-card .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.city-card .name { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
.city-card .name-en { font-size: 12px; color: var(--ink-3); margin-top: 2px; font-family: var(--font-en); letter-spacing: 0.04em; text-transform: uppercase; }

.city-card .desc { font-size: 13px; color: var(--ink-2); line-height: 1.55; text-wrap: pretty; }

/* ===== Subsidy Pill v2 ===== */
.subsidy-pill-v2 {
  display: inline-flex; flex-direction: column; align-items: flex-start;
  padding: 8px 12px; border-radius: 10px; margin: 8px 0 2px;
  background: linear-gradient(135deg, #FFF3E2, #FFE0BA);
  border: 1px solid #FFD3A0;
}
.subsidy-pill-v2 .sn { font-size: 18px; font-weight: 600; color: var(--amber-ink); letter-spacing: -0.01em; }
.subsidy-pill-v2 .sl { font-size: 11px; color: var(--amber-ink); opacity: 0.7; margin-top: 2px; }
.subsidy-pill-v2.muted { background: var(--bg-2); border-color: var(--line); }
.subsidy-pill-v2.muted .sn { color: var(--ink-3); }
.subsidy-pill-v2.muted .sl { color: var(--ink-3); opacity: 0.6; }

/* ===== Conditions Block ===== */
.conditions-block {
  display: flex; flex-direction: column; gap: 3px;
  padding: 8px 0; margin-top: 2px;
  border-top: 1px dashed var(--line);
}
.cond-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--ink-3); line-height: 1.5;
}
.cond-item svg { color: var(--amber); flex-shrink: 0; }

/* ===== Identity Link ===== */
.identity-link {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  border-radius: 11px; margin-top: auto; width: 100%;
  background: var(--ink); color: #fff; text-decoration: none;
  transition: all 140ms ease;
}
.identity-link:hover { background: #2d251c; transform: translateY(-1px); }

/* ===== Themed Tags ===== */
.tag.themed {
  font-size: 12px; padding: 4px 9px; border-radius: 7px;
  font-weight: 500;
}

.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; padding: 4px 9px; border-radius: 7px;
  background: var(--bg-2); color: var(--ink-2); font-weight: 500;
}
.dots { display: inline-flex; gap: 2px; }
.dots .d { width: 6px; height: 6px; border-radius: 50%; background: var(--line-2); }
.dots .d.on { background: var(--amber); }
.dots.teal .d.on { background: var(--teal); }
.dots.green .d.on { background: var(--green); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  border-radius: 11px; transition: all 140ms ease;
}
.btn.primary { background: var(--ink); color: #fff; flex: 1; }
.btn.primary:hover { background: #2d251c; transform: translateY(-1px); }
.btn.ghost { background: var(--bg-2); color: var(--ink-2); border: 1px solid var(--line); }
.btn.ghost:hover { background: #fff; color: var(--ink); }
.btn.warm { background: var(--gradient-amber); color: #fff; box-shadow: 0 6px 18px -8px rgba(232,132,42,.5); }
.btn.warm:hover { transform: translateY(-1px); box-shadow: 0 10px 22px -10px rgba(232,132,42,.6); }
.btn.icon { padding: 10px; }

/* ===== Identity Picker ===== */
.identity-picker-wrap { position: relative; }

.identity-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 14px; font-size: 13px;
  background: var(--bg-2); color: var(--ink-2);
  border: 1px solid var(--line); border-radius: 11px;
  transition: all 140ms ease; white-space: nowrap;
}
.identity-btn:hover { background: #fff; color: var(--ink); }
.identity-btn.has-selection {
  background: var(--amber-bg);
  border-color: rgba(245,158,66,.4);
  color: var(--amber-ink);
}
.identity-btn .id-val {
  max-width: 130px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  font-weight: 500;
}
.identity-btn .id-lbl { color: var(--ink-3); font-size: 12px; font-weight: 400; }
.identity-btn.has-selection .id-lbl { color: var(--amber-ink); opacity: 0.7; }
.identity-btn .id-arr { font-size: 9px; color: var(--ink-3); margin-left: 1px; }

.identity-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: 258px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: 0 24px 56px -18px rgba(60,45,20,.22), 0 4px 18px rgba(60,45,20,.08);
  z-index: 300; overflow: hidden;
  animation: drop-in 180ms cubic-bezier(.2,.8,.2,1) both;
}
@keyframes drop-in {
  from { opacity: 0; transform: translateY(-8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)  scale(1); }
}

.id-hd {
  padding: 14px 16px 11px;
  border-bottom: 1px solid var(--line);
}
.id-hd-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.id-hd-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }

.id-opts { padding: 8px; display: flex; flex-direction: column; gap: 3px; }

.id-opt {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 11px;
  background: transparent;
  border: 1.5px solid transparent;
  text-align: left; width: 100%;
  cursor: pointer; transition: all 140ms ease;
}
.id-opt:hover { background: var(--bg-2); }
.id-opt.sel {
  background: var(--amber-bg);
  border-color: rgba(245,158,66,.4);
}
.id-opt-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--bg-2);
  display: grid; place-items: center;
  font-size: 16px; flex-shrink: 0;
  transition: background 140ms ease;
}
.id-opt.sel .id-opt-icon { background: rgba(255,255,255,.8); }
.id-opt-text { flex: 1; font-size: 13px; font-weight: 500; color: var(--ink); }
.id-opt-ck {
  width: 18px; height: 18px; border-radius: 5px;
  border: 1.5px solid var(--line-2);
  background: transparent; flex-shrink: 0;
  position: relative;
  transition: all 140ms ease;
}
.id-opt.sel .id-opt-ck {
  background: var(--amber); border-color: var(--amber);
}
.id-opt.sel .id-opt-ck::after {
  content: ""; position: absolute;
  left: 4px; top: 1px;
  width: 4px; height: 9px;
  border: solid #fff; border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.id-count-badge {
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  background: var(--amber); color: #fff;
  border-radius: 999px; margin-left: 2px;
}

.id-foot {
  padding: 8px; border-top: 1px solid var(--line);
  display: flex; gap: 6px;
}
.id-foot-clear {
  padding: 8px 14px; border-radius: 9px;
  background: var(--bg-2); color: var(--ink-3);
  font-size: 12px; font-weight: 500;
  border: none; cursor: pointer;
  transition: all 140ms ease;
}
.id-foot-clear:hover { background: var(--rose-bg); color: var(--rose-ink); }
.id-foot-done {
  flex: 1; padding: 8px;
  border-radius: 9px;
  background: var(--gradient-amber);
  color: #fff; font-size: 12px; font-weight: 600;
  border: none; cursor: pointer;
  transition: all 140ms ease;
}
.id-foot-done:hover { transform: translateY(-1px); }

/* ===== Q&A flow ===== */
.match-wrap {
  display: grid; grid-template-columns: 320px 1fr; gap: 20px; min-height: 540px;
}
.match-side {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 22px;
  box-shadow: var(--shadow-sm); position: relative; overflow: hidden; height: max-content;
}
.match-side::before {
  content: ""; position: absolute; right: -30px; top: -30px;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(245,158,66,.18), transparent 70%);
}
.match-side h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; position: relative; }
.match-side .lead { font-size: 13px; color: var(--ink-3); margin-bottom: 18px; line-height: 1.55; position: relative; }

.step-list { display: flex; flex-direction: column; gap: 4px; position: relative; }
.step-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 11px;
  font-size: 13px; color: var(--ink-2); font-weight: 500;
  transition: all 140ms ease;
}
.step-item .num {
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--bg-2); color: var(--ink-3);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.step-item.done .num { background: var(--green-bg); color: var(--green-ink); }
.step-item.active { background: var(--amber-bg); color: var(--amber-ink); }
.step-item.active .num { background: var(--amber); color: #fff; }

.progress-block { margin-top: 18px; padding: 14px; background: var(--bg); border-radius: 12px; position: relative; }
.progress-block .pl { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; }
.progress-block .pv { font-size: 22px; font-weight: 600; color: var(--ink); margin-top: 2px; letter-spacing: -0.02em; }
.progress-bar { margin-top: 10px; height: 6px; background: var(--line); border-radius: 99px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: var(--gradient-amber); border-radius: 99px; transition: width 360ms cubic-bezier(.2,.8,.2,1); }

.match-main {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 36px 40px;
  box-shadow: var(--shadow-md);
  display: flex; flex-direction: column; min-height: 540px;
}
.q-step-label { font-size: 12px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.q-title { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.25; margin-bottom: 8px; }
.q-sub { font-size: 14px; color: var(--ink-3); margin-bottom: 28px; line-height: 1.55; }

.choice-grid { display: grid; gap: 12px; }
.choice-grid.cols-2 { grid-template-columns: 1fr 1fr; }

  <script type="text/babel">
// ═══════════════════════════════════════════════════════════
// CONSTANTS — Identity Options
// ═══════════════════════════════════════════════════════════
const IDENTITY_OPTIONS = [
  { v: "entrepreneur", icon: "💡", t: "创业者" },
  { v: "overseas",     icon: "✈️", t: "留学归国" },
  { v: "graduate",     icon: "📜", t: "应届毕业生" },
];

// ═══════════════════════════════════════════════════════════
// TWEAKS PANEL HELPERS
// ═══════════════════════════════════════════════════════════
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
      <div className="twk-hd" onMouseDown={onDragStart}>
        <b>{title}</b>
        <button className="twk-x" aria-label="Close" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.v === value || o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map(o => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

    "M0 56h10v-20h14v14h6v-26h8v26h12v-14h10v22h6v-10h12v16h16v-12h6v16h-100Z",

  ];
  return (

const Sparkline = ({ data = [4,7,5,9,8,12,10,14], color = "#E8842A", w = 110, h = 36 }) => {
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / (max - min || 1)) * (h - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <svg className="spark" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      <polyline points={`${pts} ${w},${h} 0,${h}`} fill={color} opacity="0.12" />
    </svg>
  );
};

const IdentityPicker = ({ selectedIdentity, onChange }) => {
  const [open, setOpen] = React.useState(false);
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const select = (v) => {
    onChange(selectedIdentity === v ? null : v);
    setOpen(false);
  };

  const displayLabel = selectedIdentity
    ? IDENTITY_OPTIONS.find(o => o.v === selectedIdentity)?.t || "选择身份"
    : "选择我的身份";

  return (
    <div className="identity-picker-wrap" ref={wrapRef}>
      <button
        className={`identity-btn ${selectedIdentity ? 'has-selection' : ''}`}
        onClick={() => setOpen(o => !o)}
      >
        <Icon name="user" size={14} />
        <span className="id-lbl">身份：</span>
        <span className="id-val">{displayLabel}</span>
        <Icon name="chevronDown" size={12} strokeWidth={2.5} style={{ opacity: 0.5, transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 160ms ease' }} />
      </button>

      {open && (
        <div className="identity-dropdown">
          <div className="id-hd">
            <div className="id-hd-title">选择身份</div>
            <div className="id-hd-sub">单选 · 切换后展示对应补贴数据</div>
          </div>
          <div className="id-opts">
            {IDENTITY_OPTIONS.map(opt => (
              <button
                key={opt.v}
                className={`id-opt ${selectedIdentity === opt.v ? 'sel' : ''}`}
                onClick={() => select(opt.v)}
              >
                <div className="id-opt-icon">{opt.icon}</div>
                <div className="id-opt-text">{opt.t}</div>
                <div className="id-opt-ck"></div>
              </button>
            ))}
          </div>
          <div className="id-foot">
            {selectedIdentity && (
              <button className="id-foot-clear" onClick={() => { onChange(null); setOpen(false); }}>清除选择</button>
            )}
            <button className="id-foot-done" onClick={() => setOpen(false)}>确定</button>
          </div>
        </div>
      )}
    </div>
  );
};

  if (!identity || !city.identityData || !city.identityData[identity]) return null;
  return city.identityData[identity];
};

const ExploreView = ({ cities, favs, toggleFav, onOpenMatch, selectedIdentity = null }) => {
  const [query, setQuery] = React.useState("");
  const [region, setRegion] = React.useState("全部");
  const [sort, setSort] = React.useState("subsidy");

  const regions = ["全部","北方","南方"];


  const filtered = React.useMemo(() => {
    let list = cities.filter(c => {
      if (region !== "全部" && c.region !== region) return false;
      if (query && !c.name.includes(query) && !c.nameEn.toLowerCase().includes(query.toLowerCase()) && !c.tags.some(t => t.t.includes(query))) return false;
      return true;
    });
    if (sort === "subsidy") list = [...list].sort((a, b) => b.subsidy - a.subsidy);
    if (sort === "cost")    list = [...list].sort((a, b) => a.cost - b.cost);
    if (sort === "jobs")    list = [...list].sort((a, b) => b.jobs - a.jobs);

    return list;
  }, [cities, region, query, sort, selectedIdentity]);

  const totalSubsidy = cities.reduce((s, c) => s + c.subsidy, 0);
  const maxSubsidy = Math.max(...cities.map(c => c.subsidy));

  return (
    <div className="fade-in">
      <section className="hero">
        <div className="hero-inner">
          <div>
            <span className="hero-eyebrow"><span className="dot"></span>2026 春 · 政策已更新</span>

          <div className="hero-stats">
            <div className="hero-stat">
              <div className="num">{cities.length}</div>
              <div className="lbl">收录城市</div>
            </div>
            <div className="hero-stat">
              <div className="num">¥{(maxSubsidy / 10000).toFixed(0)}万</div>
              <div className="lbl">最高补贴</div>
            </div>
            <div className="hero-stat">
              <div className="num">¥{(totalSubsidy / 10000).toFixed(0)}万</div>
              <div className="lbl">补贴池总额</div>
            </div>
          </div>
        </div>
      </section>

      {selectedIdentity && (
        <div className="persona-banner">
          <Icon name="target" size={14} />
          <span>
            当前身份：<strong>{IDENTITY_OPTIONS.find(o => o.v === selectedIdentity)?.t}</strong> — 展示对应补贴数据与申领条件

          <span className="search-kbd">⌘ K</span>
        </div>
        <button className="btn warm" onClick={onOpenMatch}>
          <Icon name="sparkles" size={15} />智能匹配
        </button>
      </div>

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", margin:"4px 4px 14px", flexWrap:"wrap", gap:12 }}>
        <div className="chip-row">
          {regions.map(r => (
            <button key={r} className={`chip ${region === r ? "active" : ""}`} onClick={() => setRegion(r)}>
              {r === "全部" && <Icon name="compass" size={13} />}
              {r === "北方" && <span className="ico">🏔</span>}
              {r === "南方" && <span className="ico">🌊</span>}
              {r}
            </button>
          ))}
        </div>
      </div>

      <div className="section-head">
        <div className="st">为你筛选 <span style={{ color:"var(--amber-ink)" }}>{filtered.length}</span> 座城市</div>

          return (
            <article key={c.id} className="city-card" style={{ "--c1": c.c1, "--c2": c.c2, animationDelay: `${i * 40}ms` }}>
              <div className="banner">
                <span className="city-pin">{c.region} · {c.tier}</span>
                <button className={`fav-btn ${favs.includes(c.id) ? "active" : ""}`} onClick={() => toggleFav(c.id)} aria-label="收藏">

    ]
  },
];

// Age bracket → numeric midpoint for eligibility checking
const ageMidpoint = { under25: 23, '25to30': 28, '30to35': 33, '35to40': 38, over40: 43 };

// Scoring: map question answers to city features
const scoreMatch = (city, selections, freeText) => {
  let score = 0;
  const reasons = [];
  const sel = selections || {};

  // Region matching
  const regionSel = sel.region || [];
  if (regionSel.length > 0) {
    if (regionSel.includes('south') && city.region === '南方') { score += 3; reasons.push('符合地域偏好(南方)'); }
    if (regionSel.includes('north') && city.region === '北方') { score += 3; reasons.push('符合地域偏好(北方)'); }
    if (regionSel.includes('coastal') && /沿海|青岛|大连|厦门|珠海|海口|深圳|上海|天津|宁波|温州|烟台|威海/.test(city.desc + city.name + city.tags.map(t=>t.t).join())) {
      score += 2; reasons.push('沿海城市');
    }
    if (regionSel.includes('tier1') && city.tier === '一线') { score += 3; reasons.push('一线城市'); }
    if (regionSel.includes('new1') && city.tier === '新一线') { score += 2; reasons.push('新一线城市'); }
    if (regionSel.includes('tier2') && city.tier === '二线') { score += 2; reasons.push('二线城市'); }
  }

  // Degree → audience matching
  const degree = sel.degree;
  if (degree) {
    const audienceMap = { bachelor:'应届生', master:'硕士以上', doctor:'博士', overseas:'留学归国' };
    const audience = audienceMap[degree];
    if (audience && city.audience.includes(audience)) { score += 2.5; reasons.push(`学历对口(${audience})`); }
  }

  // Age eligibility: check against identityData age_max
  if (sel.age) {
    const userAge = ageMidpoint[sel.age] || 30;
    // Check graduate identity data for age limits
    const gData = city.identityData?.graduate;
    if (gData && gData.age_max) {
      if (userAge <= gData.age_max) { score += 2; reasons.push('年龄符合补贴要求'); }
      else { score -= 3; reasons.push('⚠年龄超过补贴上限'); }
    }
  }

  // Social security eligibility
  if (sel.socialSecurity) {
    const gData = city.identityData?.graduate;
    const ssMonths = { none:0, lt6:3, '6to12':9, gt12:15 }[sel.socialSecurity] || 0;
    if (gData && gData.social_security_min_months) {
      if (ssMonths >= gData.social_security_min_months) { score += 1.5; reasons.push('社保符合申领条件'); }
      else { score -= 2; reasons.push('⚠社保未达申领门槛'); }
    }
  }

  // Hukou willingness vs policy requirement
  if (sel.hukou && sel.hukou !== 'unsure') {
    const gData = city.identityData?.graduate;
    if (gData && gData.requires_hukou) {
      if (gData.requires_hukou === '必须落户' && sel.hukou === 'no') {
        score -= 3; reasons.push('⚠该城补贴须落户');
      } else if (gData.requires_hukou === '落户优先（非必须）' && sel.hukou === 'no') {
        score -= 1; reasons.push('落户可获更高补贴');
      } else if (sel.hukou === 'yes') {
        score += 1.5; reasons.push('落户意愿匹配政策要求');
      }
    }
  }

  // Subsidy boost — always factors in
  score += city.subsidy / 50000;

  return { score, reasons };
};

const MatchView = ({ cities, favs, toggleFav, selectedIdentity = null }) => {
  const [selections, setSelections] = React.useState({});
  const [freeText, setFreeText] = React.useState("");
  const [results, setResults] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  const toggleOption = (qId, v, multi) => {
    setSelections(prev => {
      if (multi) {
        const cur = prev[qId] || [];
        return { ...prev, [qId]: cur.includes(v) ? cur.filter(x => x !== v) : [...cur, v] };
      }
      return { ...prev, [qId]: prev[qId] === v ? undefined : v };
    });
  };

  const runMatch = () => {
    setLoading(true);
    // Simulate brief processing delay for UX feedback
    setTimeout(() => {
      const scored = cities.map(c => {
        const { score, reasons } = scoreMatch(c, selections, freeText);
        return { city: c, score, reasons };
      });
      scored.sort((a, b) => b.score - a.score);
      const max = scored[0]?.score || 1;
      const ranked = scored.slice(0, 12).map(s => ({
        ...s,
        pct: Math.max(40, Math.min(99, Math.round(50 + (s.score / max) * 49)))
      }));
      setResults(ranked);
      setLoading(false);
    }, 300);
  };

  const hasSelection = Object.values(selections).some(v =>
    v && (Array.isArray(v) ? v.length > 0 : true)
  );

  return (
    <div className="fade-in">
      <div className="match-v2-wrap">
        {/* Left Column: Structured Questions */}
        <div className="match-v2-left">
          <h3 className="match-v2-title">📋 告诉我你的情况</h3>
          {MATCH_QUESTIONS.map(q => {
            const val = selections[q.id];
            const isMulti = q.multi;
            return (
              <div key={q.id} className="match-v2-q">
                <div className="match-v2-q-label">
                  <span className="match-v2-q-icon">{q.icon}</span> {q.label}
                  <span className="match-v2-q-hint">{isMulti ? '多选' : '单选'}</span>
                </div>
                <div className="chip-row" style={{ marginTop: 6 }}>
                  {q.options.map(o => {
                    const active = isMulti ? (val || []).includes(o.v) : val === o.v;
                    return (
                      <button key={o.v} className={`chip ${active ? 'active warm' : ''}`}
                        onClick={() => toggleOption(q.id, o.v, isMulti)}>
                        {o.t}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
          <button className="btn warm" style={{ width:'100%', marginTop: 16, padding: '12px 0', fontSize: 15 }}
            onClick={runMatch} disabled={loading}>
            {loading ? '⏳ 匹配中...' : (hasSelection ? '🔍 智能匹配' : '🔍 直接匹配（使用默认偏好）')}
          </button>
        </div>

        {/* Right Column: Natural Language + Results */}
        <div className="match-v2-right">
          <h3 className="match-v2-title">💬 或直接告诉我你的想法</h3>
          <textarea
            className="match-v2-textarea"
            placeholder="可以告诉我们你的专业、个人优势以及想要的工作环境等等"
            value={freeText}
            onChange={e => setFreeText(e.target.value)}
            rows={4}
          />
          <button className="btn warm" style={{ width:'100%', marginTop: 8, padding: '12px 0', fontSize: 15 }}
            onClick={runMatch} disabled={loading}>
            {loading ? '⏳ 匹配中...' : '🔍 智能匹配'}
          </button>

          {/* Results Area */}
          {results && (
            <div className="match-v2-results" style={{ marginTop: 20 }}>
              <div className="section-head" style={{ margin: '0 0 12px' }}>
                <div className="st">匹配结果 <span style={{ color:'var(--amber-ink)', fontSize: 14 }}>Top {Math.min(6, results.length)}</span></div>
              </div>
              {results.slice(0, 6).map((r, i) => (
                <div key={r.city.id} className="match-v2-row" style={{ animationDelay: `${i*60}ms` }}>
                  <div className="match-v2-rank">
                    <span className="match-v2-rank-num">{i + 1}</span>
                    <span className="match-v2-rank-pct">{r.pct}%</span>
                  </div>
                  <div className="match-v2-info">
                    <div className="match-v2-city">{r.city.name} <span style={{fontSize:11,color:'var(--ink-3)',fontWeight:400}}>{r.city.region}·{r.city.tier}</span></div>
                    <div className="match-v2-subsidy">{r.city.subsidyLabel} · {r.city.subsidyKind}</div>
                    {r.reasons.length > 0 && (
                      <div className="match-v2-reasons">
                        {r.reasons.map((rs, j) => <span key={j} className="match-v2-reason-tag">{rs}</span>)}
                      </div>
                    )}
                  </div>
                  <a href={r.city.link} target="_blank" rel="noopener noreferrer" className="match-v2-link">查看政策 →</a>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// FAVORITES VIEW

const FavoritesView = ({ cities, favs, toggleFav, onOpenExplore }) => {
  const favCities = cities.filter(c => favs.includes(c.id));
  const totalSubsidy = favCities.reduce((s, c) => s + c.subsidy, 0);
  const maxSubsidy = favCities.length ? Math.max(...favCities.map(c => c.subsidy)) : 0;
  const topCity = favCities.find(c => c.subsidy === maxSubsidy);
  const avgCost = favCities.length ? (favCities.reduce((s, c) => s + c.cost, 0) / favCities.length) : 0;

  if (!favCities.length) {
    return (
      <div className="fade-in">
        <div className="empty-state">
          <div className="ei">🗂</div>
          <div className="et">还没有收藏的城市</div>
          <div className="ed">回到首页点击 ❤ 把感兴趣的城市加进来，这里会自动汇总你的总补贴池。</div>
          <button className="btn warm" style={{ marginTop:18 }} onClick={onOpenExplore}>
            <Icon name="compass" size={14} /> 去探索城市
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in">
      <div className="stat-row">
        <div className="stat-card feature">
          <div className="sc-head"><div className="sc-ico">🏆</div><div className="sc-lbl">Highest Subsidy · 最高补贴</div></div>
          <div className="sc-val"><span className="currency">¥</span>{(maxSubsidy/10000).toFixed(0)}<span style={{ fontSize:24, marginLeft:2 }}>万</span></div>
          <div className="sc-foot"><Icon name="pin" size={12} /> 来自 <span className="from">{topCity?.name}</span> · {topCity?.subsidyKind}</div>
          <Sparkline data={[3,5,8,7,12,14,18,maxSubsidy/16000]} color="#E8842A" />
        </div>
        <div className="stat-card feature green">
          <div className="sc-head"><div className="sc-ico">💰</div><div className="sc-lbl">Total Available · 收藏总补贴</div></div>
          <div className="sc-val"><span className="currency">¥</span>{(totalSubsidy/10000).toFixed(1)}<span style={{ fontSize:24, marginLeft:2 }}>万</span></div>
          <div className="sc-foot"><Icon name="chart" size={12} /> 共 <span className="from">{favCities.length} 座城市</span> · 累加可申请金额</div>
          <Sparkline data={[2,4,6,9,12,18,22,totalSubsidy/14000]} color="#4F8F3A" />
        </div>
        <div className="stat-card">
          <div className="sc-head"><div className="sc-ico" style={{ background:"var(--bg-2)" }}>🌿</div><div className="sc-lbl">Avg. Cost · 平均生活成本</div></div>
          <div className="sc-val" style={{ fontSize:30 }}>{["","极低","较低","中等","偏高","高"][Math.round(avgCost)]}</div>
          <div className="sc-foot"><DotLevel level={Math.round(avgCost)} color="amber" /><span style={{ marginLeft:4 }}>5 级评分中的 <span className="from">{avgCost.toFixed(1)}</span></span></div>
        </div>
      </div>

      <div className="section-head">
        <div className="st">收藏的城市</div>
        <div className="sn">{favCities.length} 座 · 点击 <Icon name="trash" size={11} /> 移除</div>
      </div>

      <div className="fav-list">
        {favCities.map(c => (
          <div key={c.id} className="fav-row" style={{ "--c1":c.c1, "--c2":c.c2 }}>
            <div className="glyph">{c.glyph}</div>
            <div className="meta-block">
              <div className="name">{c.name} <span style={{ color:"var(--ink-3)", fontWeight:400, fontSize:13, marginLeft:6 }}>{c.nameEn}</span></div>
              <div className="desc">{c.region} · {c.tier} · {c.subsidyKind}</div>
            </div>
            <div className="ftags">{c.tags.slice(0, 2).map(t => <Tag key={t.t} t={t.t} c={t.c} />)}</div>
            <div className="level">
              <div>
                <div style={{ fontSize:11, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:3 }}>生活成本</div>
                <DotLevel level={c.cost} color="amber" />
              </div>
            </div>
            <div className="data" style={{ marginRight:6 }}>
              <span className="v">{c.subsidyLabel}</span>
              <span className="l">{c.subsidyKind}</span>
            </div>
            <button className="rm-btn" onClick={() => toggleFav(c.id)} aria-label="移除收藏">
              <Icon name="trash" size={15} />
            </button>
          </div>
        ))}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════
const TWEAK_DEFAULTS = { "accent":"amber", "rounded":"soft", "showSkyline":true };

const ACCENT_PRESETS = {
  amber:  { "--amber":"#F59E42","--amber-2":"#E8842A","--amber-bg":"#FFF3E2","--amber-bg-2":"#FFE7C9","--amber-ink":"#8A4D10","--gradient-amber":"linear-gradient(135deg, #F8A94E 0%, #E8842A 100%)" },
  rose:   { "--amber":"#E07A8B","--amber-2":"#C8556A","--amber-bg":"#FBE3E7","--amber-bg-2":"#F4C9D2","--amber-ink":"#8B2E40","--gradient-amber":"linear-gradient(135deg, #E89AA8 0%, #C8556A 100%)" },
  teal:   { "--amber":"#4FA89C","--amber-2":"#2E8C81","--amber-bg":"#DCEFEB","--amber-bg-2":"#BEDFD8","--amber-ink":"#1F5F58","--gradient-amber":"linear-gradient(135deg, #6FB8AD 0%, #2E8C81 100%)" },
  indigo: { "--amber":"#6E78DE","--amber-2":"#4F5BD5","--amber-bg":"#E6E8FB","--amber-bg-2":"#D0D4F4","--amber-ink":"#2E369B","--gradient-amber":"linear-gradient(135deg, #8189E2 0%, #4F5BD5 100%)" },
};

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = React.useState("explore");
  const [favs, setFavs] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("city-favs") || "[]"); } catch { return []; }
  });
  const [selectedIdentity, setSelectedIdentity] = React.useState(() => {
    try {
      const raw = localStorage.getItem("city-identity");
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        const mapping = { student: "graduate", grad: "graduate", overseas: "overseas", jobseek: "graduate", master: "graduate", doctor: "overseas" };
        const valid = parsed.map(v => mapping[v]).filter(Boolean);
        const result = valid[0] || null;
        localStorage.setItem("city-identity", JSON.stringify(result));
        return result;
      }
      if (typeof parsed === "string" && ["entrepreneur","overseas","graduate"].includes(parsed)) return parsed;
      return null;
    } catch { return null; }
  });
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => { localStorage.setItem("city-favs", JSON.stringify(favs)); }, [favs]);
  React.useEffect(() => { localStorage.setItem("city-identity", JSON.stringify(selectedIdentity)); }, [selectedIdentity]);

  React.useEffect(() => {
    const preset = ACCENT_PRESETS[tweaks.accent] || ACCENT_PRESETS.amber;
    Object.entries(preset).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
    const r = tweaks.rounded === "sharp"
      ? { lg:"10px", md:"8px", sm:"6px" }
      : tweaks.rounded === "extra"
        ? { lg:"28px", md:"22px", sm:"14px" }
        : { lg:"22px", md:"16px", sm:"10px" };
    document.documentElement.style.setProperty("--radius-lg", r.lg);
    document.documentElement.style.setProperty("--radius", r.md);
    document.documentElement.style.setProperty("--radius-sm", r.sm);
  }, [tweaks.accent, tweaks.rounded]);

  const toggleFav = (id) => {
    setFavs(prev => {
      const adding = !prev.includes(id);
      const next = adding ? [...prev, id] : prev.filter(x => x !== id);
      const city = CITIES.find(c => c.id === id);
      showToast(adding ? `已收藏 ${city?.name}` : `已移除 ${city?.name}`, adding ? "✓" : "✕");
      return next;
    });
  };

  const showToast = (msg, ico) => {
    setToast({ msg, ico, at: Date.now() });
    clearTimeout(window.__toastT);
    window.__toastT = setTimeout(() => setToast(null), 2200);
  };

  const tabs = [
    { id:"explore", label:"探索城市", en:"Explore", ico:"compass" },
    { id:"match",   label:"智能匹配", en:"Match",   ico:"sparkles" },
    { id:"favs",    label:"收藏夹",   en:"Saved",   ico:"bookmark", badge: favs.length || null },
  ];

  return (
    <div className="shell">
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark">补</div>
          <div>
            <div>城市补贴指南</div>
            <div className="brand-sub">CityMatch · 人才政策一站式比较</div>
          </div>
        </div>

        <nav className="tabs" role="tablist">
          {tabs.map(tt => (
            <button key={tt.id} className={`tab ${tab === tt.id ? "active" : ""}`} role="tab" onClick={() => setTab(tt.id)}>
              <Icon name={tt.ico} size={14} />
              {tt.label}
              {tt.badge ? <span className="badge">{tt.badge}</span> : null}
            </button>
          ))}
        </nav>

        <div className="top-user">
          <IdentityPicker selectedIdentity={selectedIdentity} onChange={setSelectedIdentity} />
          <div className="avatar">W</div>
        </div>
      </header>

      <main>
        {tab === "explore" && <ExploreView cities={CITIES} favs={favs} toggleFav={toggleFav} onOpenMatch={() => setTab("match")} selectedIdentity={selectedIdentity} />}
        {tab === "match"   && <MatchView   cities={CITIES} favs={favs} toggleFav={toggleFav} onPickCity={() => setTab("explore")} selectedIdentity={selectedIdentity} />}
        {tab === "favs"    && <FavoritesView cities={CITIES} favs={favs} toggleFav={toggleFav} onOpenExplore={() => setTab("explore")} />}
      </main>

      <div className={`toast ${toast ? "show" : ""}`}>
        <span>{toast?.ico}</span>{toast?.msg}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="主题配色">
          <TweakRadio
            label="强调色"
            value={tweaks.accent}
            options={[{ label:"琥珀", value:"amber" },{ label:"玫瑰", value:"rose" },{ label:"墨绿", value:"teal" },{ label:"靛蓝", value:"indigo" }]}
            onChange={v => setTweak("accent", v)}
          />
          <TweakRadio
            label="卡片圆角"
            value={tweaks.rounded}
            options={[{ label:"锐利", value:"sharp" },{ label:"柔和", value:"soft" },{ label:"强烈", value:"extra" }]}
            onChange={v => setTweak("rounded", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
